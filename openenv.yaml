name: cybersec-openenv
description: Cybersecurity environment
version: "1.0"

entry_point: env.environment:CyberSecEnv

observation_space:
  type: object
  properties:
    available_tools:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object

action_space:
  type: string
  enum:
    - scan_log
    - flag_alert
    - block_ip
    - escalate_case

reward_range: [-2, 2]

# 🔥 REAL FIX
tasks:
- id: t1
  description: detect threats
  grader: "env.grader:grade"

- id: t2
  description: flag alerts
  grader: "env.grader:grade"

- id: t3
  description: block ip
  grader: "env.grader:grade"