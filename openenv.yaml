name: cybersec-openenv
description: Cybersecurity environment
version: "1.0"

entry_point: env.environment:CyberSecEnv

observation_space:
  type: object
  properties:
    available_tools:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object

action_space:
  type: string
  enum:
    - scan_log
    - flag_alert
    - block_ip
    - escalate_case

reward_range: [-2, 2]

# 🔥 REAL FIX
tasks:
  - id: t1
    name: detect threats
    description: detect malicious logs
    grader: "env.environment:CyberSecEnv"

  - id: t2
    name: flag alerts
    description: flag suspicious activity
    grader: "env.environment:CyberSecEnv"

  - id: t3
    name: block ip
    description: block malicious ip
    grader: "env.environment:CyberSecEnv"