name: cybersec-openenv
description: Cybersecurity environment for threat detection
version: 1.0

entry_point: env.environment:CyberSecEnv

observation_space:
  type: object
  properties:
    available_tools:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object

action_space:
  type: string
  enum:
    - scan_log
    - flag_alert
    - block_ip
    - escalate_case

reward_range: [-2, 2]

# =========================
# ✅ REQUIRED TASKS + GRADERS
# =========================
tasks:

  - id: detect_threat
    description: Detect suspicious activity
    grader:
      type: score_range
      min: 0.1
      max: 0.9

  - id: flag_alert
    description: Flag malicious alerts
    grader:
      type: score_range
      min: 0.1
      max: 0.9

  - id: block_ip
    description: Block malicious IP addresses
    grader:
      type: score_range
      min: 0.1
      max: 0.9