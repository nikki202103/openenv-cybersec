name: cybersec-openenv
description: Cybersecurity environment for threat detection
version: 1.0

entry_point: env.environment:CyberSecEnv

observation_space:
  type: object
  properties:
    available_tools:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object

action_space:
  type: string
  enum:
    - scan_log
    - flag_alert
    - block_ip
    - escalate_case

reward_range: [-2, 2]

# 🔥 THIS FORMAT IS THE KEY
tasks:
  - id: t1
    description: detect threats
    grader:
      type: simple

  - id: t2
    description: flag alerts
    grader:
      type: simple

  - id: t3
    description: block ips
    grader:
      type: simple