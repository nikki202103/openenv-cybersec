name: cybersec-openenv
description: >
  Cybersecurity environment where agents detect threats and respond.

version: 1.0

entry_point: env.environment:CyberSecEnv

observation_space:
  type: object
  properties:
    available_tools:
      type: array
      items:
        type: string
    history:
      type: array
      items:
        type: object

action_space:
  type: string
  enum:
    - scan_log
    - flag_alert
    - block_ip
    - escalate_case

reward_range: [-2, 2]

# =========================
# 🔥 REQUIRED FOR PHASE 2
# =========================
tasks:

  - id: task_1
    description: Detect suspicious logs
    grader:
      type: reward
      min_score: 0.1
      max_score: 0.9

  - id: task_2
    description: Flag malicious activity
    grader:
      type: reward
      min_score: 0.1
      max_score: 0.9

  - id: task_3
    description: Block malicious IPs
    grader:
      type: reward
      min_score: 0.1
      max_score: 0.9